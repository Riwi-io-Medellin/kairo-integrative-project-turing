<!DOCTYPE html>
<html lang="es">
<head>
    <title>Chat IA - MatchFlow</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen p-4">
    <div class="max-w-4xl mx-auto">
        <div class="bg-white/90 backdrop-blur-xl rounded-3xl shadow-2xl overflow-hidden h-[80vh] flex flex-col">
            <div class="bg-gradient-to-r from-indigo-600 to-purple-600 p-6 text-white text-center">
                <h1 class="text-3xl font-bold mb-2">🤖 KAIRO AI + SUPABASE</h1>
                <p class="opacity-90">Busca en tu tabla documents</p>
            </div>
            
            <div id="messages" class="flex-1 p-6 overflow-y-auto bg-gray-50 space-y-4">
                <div class="text-center text-gray-500 py-4">Escribe "KAIRO" o copia texto para buscar...</div>
            </div>
            
            <div class="p-6 bg-white border-t">
                <div class="flex gap-2">
                    <input type="text" id="messageInput" class="flex-1 border border-gray-300 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="¿KAIRO? ¿MatchFlow?">
                    <button onclick="sendMessage()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl hover:bg-indigo-700 font-medium">Buscar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const messages = document.getElementById('messages');
        const input = document.getElementById('messageInput');

        // 🔥 FUNCIÓN NUEVA sendMessage() - REEMPLAZA LA ORIGINAL
        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            // Mensaje usuario
            addMessage('Tú', text, 'bg-blue-500 text-white ml-auto');
            input.value = '';

            try {
                const response = await fetch('http://localhost:8000/chat-db', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                const data = await response.json();
                
                // 🔥 MUESTRA FUENTES DELA BD
                let respuesta = data.answer || "Sin respuesta IA";
                if (data.sources && data.sources.length > 0) {
                    respuesta += `<br><br><small><strong>📊 Fuentes (${data.sources.length}):</strong><br>`;
                    data.sources.forEach((src, i) => {
                        respuesta += `${i+1}. <strong>${src.title}</strong>: ${src.content.substring(0, 100)}...<br>`;
                    });
                    respuesta += `</small>`;
                } else {
                    respuesta += `<br><small>❌ No encontré en Supabase</small>`;
                }
                
                addMessage('KAIRO AI', respuesta, 'bg-gradient-to-r from-emerald-100 to-blue-100 border-l-4 border-emerald-500 text-sm');
            } catch (error) {
                console.error(error);
                addMessage('Error', 'Backend no responde (¿puerto 8000? CORS?)', 'bg-red-200');
            }
        }

        function addMessage(sender, text, classes) {
            const div = document.createElement('div');
            div.className = `max-w-xs lg:max-w-md p-3 rounded-2xl ${classes} rounded-br-none break-words`;
            div.innerHTML = `<strong>${sender}:</strong><br><span class="mt-1">${text}</span>`;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        // Enter para enviar
        input.addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
