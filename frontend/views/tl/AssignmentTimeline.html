<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Assignment Timeline TL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="./../../css/AssignmentTimeline.css" />
  </head>

  <body>
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <img class="rounded-3" src="./assets/logo2.png" alt="logo" style="width: 14rem; height: 8rem"/>
      </div>
      <ul>
        <li><a href="./dashboard.html"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
        <li class="active"><a href="#"><i class="fa-solid fa-coins"></i> Assignment Timeline</a></li>
        <li><a href="./messages.html"><i class="fa-solid fa-message"></i> Messages</a></li>
        <li><a href=""><i class="fa-solid fa-calendar"></i> Calendar</a></li>
      </ul>
    </aside>

    <!-- Main -->
    <main class="main">
      <!-- Topbar -->
      <div class="topbar mb-4">
        <strong>COMPANY NAME</strong>
        <div class="d-flex align-items-center gap-3">
          <span>NAME TL</span>
          <i class="fa-solid fa-user fs-4"></i>
          <i class="fa-regular fa-bell fs-4"></i>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox"/>
          </div>
        </div>
      </div>

      <!-- Header -->
      <div class="d-flex justify-content-evenly align-items-center gap-3 mb-3 mounth">
        <h2 class="mb-0">My Activities</h2>
        <span>|</span>
        <span class="active">January</span>
        <span>February</span>
        <span>March</span>
        <span>April</span>
        <span>May</span>
        <span>June</span>
        <span>July</span>
        <span>August</span>
        <span>September</span>
        <span>October</span>
        <span>November</span>
        <span>December</span>
      </div>
      <hr />

      <!-- Content -->
      <div class="row mt-4">
        <!-- Weeks -->
        <div class="col-md-3">
          <h4>Weeks</h4>

          <div class="week-item text-muted">
            <div class="week-box"></div>
            Work Week 1
          </div>

          <div class="week-item">
            <div class="week-box"></div>
            Work Week 2
          </div>

          <div class="week-item">
            <div class="week-box"></div>
            Work Week 3
          </div>

          <div class="week-item">
            <div class="week-box"></div>
            Work Week 4
          </div>
        </div>

        <!-- Projects -->
        <div class="col-md-9">
          <h4>Projects</h4>

        <!-- Card generated whith js -->
        <script>
        for (let i = 0; i < 5; i++) {
        document.write(`
            <div class="project-card">
              <div class="d-flex justify-content-between small mb-1">
                <span>2:00 pm - 8:00 pm</span>
                <span>21 Enero 2026</span>
              </div>

              <h5>CRUDZASO</h5>
              <span class="badge-custom">Código y Colaboración</span>

              <p class="mt-3">
                Participación en proyectos de desarrollo de software utilizando
                control de versiones como Git y plataformas colaborativas como
                GitHub, aplicando buenas prácticas de código, trabajo en equipo y
                desarrollo continuo de soluciones tecnológicas.
              </p>
            </div>
          `);
        }
        </script>

          <!-- Card -->
          <!-- <div class="project-card">
            <div class="d-flex justify-content-between small mb-1">
              <span>2:00 pm - 8:00 pm</span>
              <span>21 Enero 2026</span>
            </div>

            <h5>CRUDZASO</h5>
            <span class="badge-custom">Código y Colaboración</span>

            <p class="mt-3">
              Participación en proyectos de desarrollo de software utilizando
              control de versiones como Git y plataformas colaborativas como
              GitHub, aplicando buenas prácticas de código, trabajo en equipo y
              desarrollo continuo de soluciones tecnológicas.
            </p>
          </div> -->
        </div>
      </div>
    </main>
  </body>
</html>
