          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="btnTheme"/>
          </div>
        </div>
      </div>

      <!-- Header -->
      <div
        class="d-flex justify-content-evenly align-items-center gap-3 mb-3 mounth section_mounth"

        <span>|</span>

        <span>May</span>
        <span>June</span>

      </div>
      <hr />

      <!-- Content -->
      <div class="row mt-4">
        <!-- Weeks -->
        <div class="col-md-3 weeks-content">
          <h4>Weeks</h4>

          <div class="week-item" data-week="1">Work Week 1</div>
          <div class="week-item" data-week="2">Work Week 2</div>
          <div class="week-item" data-week="3">Work Week 3</div>
          <div class="week-item" data-week="4">Work Week 4</div>
        </div>

        <!-- Projects -->
        <div class="col-md-9">
          <h4>Projects</h4>

          <div id="projectsContainer"></div>
        </div>
      </div>
    </main>
    <!-- ------------------ CHANGE MOD ----------------- -->
      <script>
        const btnTheme = document.getElementById("btnTheme");
        const currentTheme = localStorage.getItem("theme");

        if (currentTheme === "light") {
          document.documentElement.setAttribute("data-theme", "light");
          btnTheme.checked = true; 
        }

        btnTheme.addEventListener("change", () => {
          if (btnTheme.checked) {
            document.documentElement.setAttribute("data-theme", "light");
            localStorage.setItem("theme", "light"); 
          } else {
            document.documentElement.removeAttribute("data-theme");
            localStorage.setItem("theme", "dark"); 
          }
        });
    </script>
