<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Kairo Dashboard</title>
  <link rel="stylesheet" href="./../../css/skills_coder.css">
  <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo d-flex justify-content-center align-items-center">
        <img
          class="rounded-3"
          src="./../../views/tl/assets/logo.png"
          alt="logo"
          style="width: 9rem; height: 9rem; box-shadow: 0px 6px 32px #dedede"
        />
      </div>
      <ul>
        <li>
          <a href="./dashboard.html"
            ><i class="fa-solid fa-chart-pie" style="font-weight: 900; font-size: 1.5rem; margin-right: 0.5rem;"></i> Dashboard</a
          >
        </li>
        <li>
          <a href="./profile.html"
            ><i class="fa-solid fa-coins" style="font-weight: 900; font-size: 1.5rem; margin-right: 0.5rem;"></i> Profile</a
          >
        </li>
        <li class="active">
          <a href="#"
            ><i class="fa-solid fa-message" style="font-weight: 900; font-size: 1.5rem; margin-right: 0.5rem;"></i> Skills</a
          >
        </li>
        <li>
          <a href="#"><i class="fa-solid fa-calendar" style="font-weight: 900; font-size: 1.5rem; margin-right: 0.5rem;"></i> Discord</a>
        </li>
        <li>
          <a href="#"><i class="fa-solid fa-calendar" style="font-weight: 900; font-size: 1.5rem; margin-right: 0.5rem;"></i> AI</a>
        </li>
      </ul>
    </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- Topbar -->
      <div class="topbar mb-4">
        <strong>COMPANY NAME</strong>
        <div class="d-flex align-items-center gap-3">
          <span>NAME CODER</span>
          <i class="fa-solid fa-user fs-4"></i>
          <i class="fa-regular fa-bell fs-4"></i>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="btnTheme" />
          </div>
        </div>
      </div>
<!-- ------------------ CHANGE MOD ----------------- -->
      <script>
        const btnTheme = document.getElementById("btnTheme");
        const currentTheme = localStorage.getItem("theme");

        if (currentTheme === "light") {
          document.documentElement.setAttribute("data-theme", "light");
          btnTheme.checked = true; 
        }

        btnTheme.addEventListener("change", () => {
          if (btnTheme.checked) {
            document.documentElement.setAttribute("data-theme", "light");
            localStorage.setItem("theme", "light"); 
          } else {
            document.documentElement.removeAttribute("data-theme");
            localStorage.setItem("theme", "dark"); 
          }
        });
      </script>

  </main>

</body>
</html>
